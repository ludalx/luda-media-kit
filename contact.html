<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luda — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C1392B;
      --black: #0D0A09;
      --surface: #151110;
      --surface2: #1C1614;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #EDEAE4;
      --muted: rgba(237,234,228,0.45);
      --muted2: rgba(237,234,228,0.2);
      --display: 'Bebas Neue', sans-serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'Space Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: #0D0A09;
      background-image:
        radial-gradient(ellipse 90% 60% at 50% 0%, #2a1108 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, #1a0c06 0%, transparent 55%);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0.10;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      background-size: 160px;
    }

    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: var(--red);
      z-index: 200;
      transition: width 0.1s linear;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.6rem 5vw;
      background: rgba(9,9,9,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { height: 22px; width: auto; display: block; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.active {
      color: var(--text);
      border-bottom: 1px solid var(--red);
      padding-bottom: 1px;
    }

    .nav-cta {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--red);
      padding: 0.5rem 1.1rem;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--red); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10rem 5vw 6rem;
    }

    .contact-eyebrow {
      font-family: var(--mono);
      font-size: 0.57rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1.5rem;
      display: block;
    }

    .contact-heading {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(3.5rem, 8vw, 7.5rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      margin-bottom: 4rem;
    }

    .contact-heading em {  color: var(--muted); }

    /* links panel */
    .contact-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--border);
    }

    .contact-link-item {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem;
      border-right: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.25s;
      position: relative;
      overflow: hidden;
    }
    .contact-link-item:last-child { border-right: none; }
    .contact-link-item:hover { background: var(--surface); }

    .contact-link-item::after {
      content: '↗';
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted2);
      transition: color 0.2s, transform 0.2s;
    }
    .contact-link-item:hover::after { color: var(--red); transform: translate(2px, -2px); }

    .contact-link-platform {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 2rem;
    }

    .contact-link-value {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      line-height: 1.25;
      color: var(--text);
      word-break: break-word;
    }

    .contact-link-item:hover .contact-link-value { color: var(--text); }

    .contact-note {
      margin-top: 2.5rem;
      font-family: var(--mono);
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    /* ── FOOTER ── */
    .footer {
      padding: 2rem 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.75s ease, transform 0.75s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 760px) {
      .contact-links { grid-template-columns: 1fr; }
      .contact-link-item { border-right: none; border-bottom: 1px solid var(--border); }
      .contact-link-item:last-child { border-bottom: none; }
      .nav-links { gap: 1.2rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" style="text-decoration:none;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);">Hello</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
      <a href="mailto:ludabusinessenquiries@gmail.com" class="nav-cta">Get in touch</a>
    </div>
  </nav>

  <main>
    <span class="contact-eyebrow reveal">Contact</span>
    <h1 class="contact-heading reveal">
      Let's make<br>
      <span style="color:var(--muted)">SOMETHING.</span>
    </h1>

    <div class="contact-links reveal">

      <a class="contact-link-item" href="https://www.youtube.com/@Ludalx" target="_blank" rel="noopener">
        <span class="contact-link-platform">YouTube</span>
        <span class="contact-link-value">@Ludalx</span>
      </a>

      <a class="contact-link-item" href="https://www.instagram.com/luda.lx/" target="_blank" rel="noopener">
        <span class="contact-link-platform">Instagram</span>
        <span class="contact-link-value">@luda.lx</span>
      </a>

      <a class="contact-link-item" href="mailto:ludabusinessenquiries@gmail.com">
        <span class="contact-link-platform">Email</span>
        <span class="contact-link-value">ludabusinessenquiries<wbr>@gmail.com</span>
      </a>

    </div>

    <p class="contact-note reveal">All partnership enquiries welcome. Rates on request.</p>
  </main>

  <footer class="footer">
    <span class="footer-text">© 2026 Luda</span>
    <span class="footer-text">@Ludalx</span>
  </footer>

  <script>
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    els.forEach(el => io.observe(el));
  </script>

</body>
</html>
