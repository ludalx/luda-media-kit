<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luda — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C1392B;
      --black: #0D0A09;
      --surface: #151110;
      --surface2: #1C1614;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #EDEAE4;
      --muted: rgba(237,234,228,0.45);
      --muted2: rgba(237,234,228,0.2);
      --display: 'Bebas Neue', sans-serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'Space Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: #0D0A09;
      background-image:
        radial-gradient(ellipse 90% 60% at 50% 0%, #2a1108 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, #1a0c06 0%, transparent 55%);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0.10;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      background-size: 160px;
    }

    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: var(--red);
      z-index: 200;
      transition: width 0.1s linear;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.6rem 5vw;
      background: rgba(9,9,9,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { height: 22px; width: auto; display: block; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.active {
      color: var(--text);
      border-bottom: 1px solid var(--red);
      padding-bottom: 1px;
    }

    .nav-cta {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--red);
      padding: 0.5rem 1.1rem;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--red); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10rem 5vw 6rem;
    }

    .contact-eyebrow {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1.5rem;
      display: block;
    }

    .contact-heading {
      font-family: var(--display);
      font-weight: 400;
      font-size: clamp(3.5rem, 8vw, 7.5rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      margin-bottom: 5rem;
    }

    .contact-heading span { color: var(--muted); }

    /* ── BIG CONTACT ROWS ── */
    .contact-rows {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
    }

    .contact-row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.2rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: padding-left 0.3s ease;
      overflow: hidden;
    }

    .contact-row-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      background: var(--red);
      opacity: 0.08;
      transition: width 0.35s ease;
    }
    .contact-row-item:hover::before { width: 100%; }
    .contact-row-item:hover { padding-left: 1rem; }

    .contact-row-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .contact-icon {
      width: 52px; height: 52px;
      border: 1px solid var(--border2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.3s, background 0.3s;
    }
    .contact-row-item:hover .contact-icon {
      border-color: var(--red);
      background: rgba(193,57,43,0.1);
    }

    .contact-icon svg {
      width: 22px; height: 22px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.5;
      transition: stroke 0.3s;
    }
    .contact-row-item:hover .contact-icon svg { stroke: var(--red); }

    .contact-platform {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.35rem;
    }

    .contact-value {
      font-family: var(--display);
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
      transition: color 0.2s;
      word-break: break-all;
    }
    .contact-row-item:hover .contact-value { color: #fff; }

    .contact-arrow {
      font-size: 1.5rem;
      color: var(--muted2);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .contact-row-item:hover .contact-arrow { color: var(--red); transform: translate(4px, -4px); }

    .contact-note {
      margin-top: 3rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    /* ── PARTNERSHIP SECTION ── */
    .partnership {
      margin-top: 5rem;
      padding-top: 4rem;
      border-top: 1px solid var(--border);
    }

    .partnership-eyebrow {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red);
      display: block;
      margin-bottom: 1.25rem;
    }

    .partnership-heading {
      font-family: var(--display);
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: 0.04em;
      line-height: 0.95;
      margin-bottom: 2rem;
      color: var(--text);
    }

    .partnership-body {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 56ch;
      margin-bottom: 2rem;
    }

    .partnership-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 2rem;
      border-top: 1px solid var(--border);
    }

    .partnership-list li {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.7;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      align-items: baseline;
    }

    .partnership-list li::before {
      content: '—';
      color: var(--red);
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 0.7rem;
    }

    .partnership-past {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .partnership-disclaimer {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* ── FOOTER ── */
    .footer {
      padding: 2rem 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.75s ease, transform 0.75s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 760px) {
      .contact-value { font-size: clamp(1.4rem, 5vw, 2rem); }
      .contact-icon { width: 42px; height: 42px; }
      .contact-icon svg { width: 18px; height: 18px; }
      .nav-links { gap: 1.2rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" style="text-decoration:none;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);">Hello</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
      <a href="mailto:ludabusinessenquiries@gmail.com" class="nav-cta">Get in touch</a>
    </div>
  </nav>

  <main>
    <span class="contact-eyebrow reveal">Contact</span>
    <h1 class="contact-heading reveal">
      Let's make<br>
      <span>SOMETHING.</span>
    </h1>

    <div class="contact-rows reveal">

      <a class="contact-row-item" href="https://www.youtube.com/@Ludalx" target="_blank" rel="noopener">
        <div class="contact-row-left">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 001.46 6.42 29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z" stroke-linejoin="round"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <div class="contact-platform">YouTube</div>
            <div class="contact-value">@Ludalx</div>
          </div>
        </div>
        <span class="contact-arrow">↗</span>
      </a>

      <a class="contact-row-item" href="https://www.instagram.com/luda.lx/" target="_blank" rel="noopener">
        <div class="contact-row-left">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          </div>
          <div>
            <div class="contact-platform">Instagram</div>
            <div class="contact-value">@luda.lx</div>
          </div>
        </div>
        <span class="contact-arrow">↗</span>
      </a>

      <a class="contact-row-item" href="https://www.patreon.com/Ludalx" target="_blank" rel="noopener">
        <div class="contact-row-left">
          <div class="contact-icon">
            <!-- Patreon icon -->
            <svg viewBox="0 0 24 24"><circle cx="14.5" cy="9.5" r="6.5"/><rect x="2" y="2" width="3" height="20"/></svg>
          </div>
          <div>
            <div class="contact-platform">Patreon</div>
            <div class="contact-value">Ludalx</div>
          </div>
        </div>
        <span class="contact-arrow">↗</span>
      </a>

      <a class="contact-row-item" href="mailto:ludabusinessenquiries@gmail.com">
        <div class="contact-row-left">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div>
            <div class="contact-platform">Email</div>
            <div class="contact-value">ludabusinessenquiries@gmail.com</div>
          </div>
        </div>
        <span class="contact-arrow">↗</span>
      </a>

    </div>

    <p class="contact-note reveal">Rates on request — ludabusinessenquiries@gmail.com</p>
  </main>

  <footer class="footer">
    <span class="footer-text">© 2026 Luda</span>
    <span class="footer-text">@Ludalx</span>
  </footer>

  <script>
    const bar = document.getElementById('progress-bar');
    window.addEventListener('scroll', () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = max > 0 ? (window.scrollY / max * 100) + '%' : '0%';
    }, { passive: true });

    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    els.forEach(el => io.observe(el));
  </script>

</body>
</html>
